<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DevCollab Hub — Sign In</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%2322c55e'/><text y='.9em' font-size='60' font-weight='900' fill='%23000' x='18'>DC</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
:root{--bg:#09090b;--s1:#0f0f11;--s2:#141416;--s3:#1a1a1d;--s4:#222225;--s5:#2a2a2e;--t1:#f4f4f5;--t2:#a1a1aa;--t3:#71717a;--t4:#52525b;--green:#22c55e;--green2:#16a34a;--blue:#3b82f6;--r12:12px;--r16:16px;--r20:20px;}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:'Plus Jakarta Sans',system-ui,sans-serif;overflow:hidden}

/* Background grid */
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
.bg-glow{position:fixed;top:-20%;left:50%;transform:translateX(-50%);width:800px;height:600px;background:radial-gradient(ellipse,rgba(34,197,94,.06) 0%,transparent 70%);pointer-events:none}

.page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;position:relative;z-index:1}

/* Auth card */
.auth-card{
  width:420px;max-width:100%;
  background:rgba(15,15,17,.92);
  border:1px solid rgba(255,255,255,.07);
  border-radius:var(--r20);
  padding:44px 48px;
  box-shadow:0 40px 100px rgba(0,0,0,.8),0 0 0 1px rgba(255,255,255,.03),inset 0 1px 0 rgba(255,255,255,.05);
  backdrop-filter:blur(24px);
  animation:fadeUp .4s cubic-bezier(.16,1,.3,1) both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.auth-logo-mark{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--green),var(--green2));display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#000}
.auth-logo-name{font-size:18px;font-weight:800;letter-spacing:-.4px}
.auth-logo-name em{color:var(--green);font-style:normal}

.auth-title{font-size:22px;font-weight:800;letter-spacing:-.5px;line-height:1.2;margin-bottom:8px}
.auth-sub{font-size:13px;color:var(--t3);line-height:1.7;margin-bottom:32px}

.auth-btn{
  width:100%;display:flex;align-items:center;justify-content:center;gap:10px;
  padding:14px 20px;border-radius:var(--r12);
  background:var(--s3);border:1px solid rgba(255,255,255,.09);
  color:var(--t1);font-size:14px;font-weight:700;font-family:inherit;
  cursor:pointer;transition:all 200ms;text-decoration:none;
  margin-bottom:12px;
}
.auth-btn:hover{background:var(--s4);border-color:rgba(255,255,255,.14);transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.auth-btn:active{transform:translateY(0)}
.auth-btn-icon{width:20px;height:20px;flex-shrink:0}

.auth-feats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:28px;padding-top:24px;border-top:1px solid rgba(255,255,255,.05)}
.auth-feat{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t4);font-weight:500}
.auth-feat::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0}

/* Loading state */
.auth-btn.loading{opacity:.6;pointer-events:none}
.auth-btn.loading::after{content:'';width:14px;height:14px;border:2px solid rgba(255,255,255,.2);border-top-color:var(--t1);border-radius:50%;animation:spin .7s linear infinite;margin-left:6px}
@keyframes spin{to{transform:rotate(360deg)}}

/* If already logged in redirect */
.redirect-msg{text-align:center;font-size:12px;color:var(--t3);margin-top:16px}
.redirect-msg a{color:var(--green);text-decoration:none;font-weight:600}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-mark">DC</div>
      <span class="auth-logo-name">DevCollab <em>Hub</em></span>
    </div>
    <div class="auth-title">Engineering operations,<br>done together.</div>
    <div class="auth-sub">Real-time collaboration for dev teams. Tasks, code, channels, and AI — all in one place.</div>

    <a class="auth-btn" id="gh-btn" href="#" onclick="signInGitHub(event)">
      <svg class="auth-btn-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
      Continue with GitHub
    </a>

    <div id="auth-status" style="display:none;text-align:center;font-size:12px;color:var(--t3);margin-top:8px"></div>

    <div class="auth-feats">
      <div class="auth-feat">End-to-end encrypted</div>
      <div class="auth-feat">GitHub OAuth only</div>
      <div class="auth-feat">Role-based access</div>
      <div class="auth-feat">Real-time collaboration</div>
    </div>
  </div>
</div>

<script>
'use strict';
const IS_DEV = location.hostname==='localhost'||location.hostname==='127.0.0.1';
const API = IS_DEV ? 'http://localhost:4000/api' : 'https://devcolab-backend.onrender.com/api';
const WS_BACKEND = IS_DEV ? 'http://localhost:4000' : 'https://devcolab-backend.onrender.com';

// If already logged in, redirect
const existing = localStorage.getItem('dc_token');
if (existing) {
  // Verify token quickly
  fetch(API+'/auth/me', { headers:{'Authorization':'Bearer '+existing} })
    .then(r => r.ok ? (window.location.href='app.html') : null)
    .catch(() => null);
}

// Handle OAuth callback
const params = new URLSearchParams(location.search);
const token = params.get('token');
const err = params.get('error');
if (token) {
  localStorage.setItem('dc_token', token);
  window.location.href = 'app.html';
} else if (err) {
  const status = document.getElementById('auth-status');
  status.style.display = 'block';
  status.style.color = '#ef4444';
  status.textContent = decodeURIComponent(err);
}

function signInGitHub(e) {
  e.preventDefault();
  const btn = document.getElementById('gh-btn');
  btn.classList.add('loading');
  const status = document.getElementById('auth-status');
  status.style.display = 'block';
  status.textContent = 'Redirecting to GitHub...';
  setTimeout(() => { window.location.href = API+'/auth/github'; }, 300);
}
</script>
</body>
</html>
