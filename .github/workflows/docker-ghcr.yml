name: Publish Containers

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/api:latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/web:latest
      - uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/api:latest
          format: sarif
          output: trivy-api.sarif
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
      - uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/web:latest
          format: sarif
          output: trivy-web.sarif
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-api.sarif
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-web.sarif
